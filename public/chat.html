<!DOCTYPE html>
<html>
<body>

<h2>Chat</h2>

<input id="message" type="text">
<button onclick="sendMessage()">Enviar</button>

<ul id="messages"></ul>

<script>

let conversation_id = 1
let user = prompt("Tu nombre")

let ws = new WebSocket(
  "wss://learning-swap-backend.onrender.com/ws/chat/1"
)
ws.onmessage = (event) => {

    let data = JSON.parse(event.data)

    let li = document.createElement("li")
    li.textContent = data.user + ": " + data.message

    document.getElementById("messages").appendChild(li)
}

let sendBtn = document.querySelector("button");
let input = document.getElementById("message");

// Deshabilitar input y botón mientras conecta
input.disabled = true;
sendBtn.disabled = true;

ws.onopen = (event) => {
    console.log("Conectado al servidor de WebSockets");
    // Habilitar cuando ya conectó
    input.disabled = false;
    sendBtn.disabled = false;
};

function sendMessage(){
    // Solo enviar si la conexión está abierta (readyState === 1)
    if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            user: user,
            message: input.value
        }))
        input.value = ""
    } else {
        alert("El chat aún no se ha conectado o se ha perdido la conexión. Por favor, espera.");
    }
}

</script>

</body>
</html>
